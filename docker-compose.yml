services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hr_vidnova}
      POSTGRES_USER: ${DB_USER:-hr_vidnova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hr_vidnova_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hr_vidnova} -d ${DB_NAME:-hr_vidnova}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6394:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8050 --workers 3 --threads 4 --timeout 120"
    env_file:
      - .env
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    ports:
      - "127.0.0.1:8050:8050"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info -Q celery -c 2 --max-tasks-per-child=100
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    environment:
      HR_API_PROXY_TARGET: http://backend:8050
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:5178:5178"
    depends_on:
      - backend

volumes:
  pgdata:
  staticfiles:
  media:
