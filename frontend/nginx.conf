server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve the backend at request time so nginx does not
    # crash when the web container restarts (e.g. on a watchtower auto-update).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Django backend (API, admin, auth)
    location /api/ {
        set $hr_web web;
        proxy_pass http://$hr_web:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        set $hr_web web;
        proxy_pass http://$hr_web:8050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Static / media served from the shared volumes (filled by the web container)
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # SPA — client-side routing fallback. No $uri/ so the /assets route does not
    # collide with the Vite build's /assets/ static dir (would 403 on dir index).
    location / {
        try_files $uri /index.html;
    }
}
